# Template for integrating YOUR services with AIRP
# Copy this file and customize for each of your services

apiVersion: apps/v1
kind: Deployment
metadata:
  name: your-service-name
  namespace: shopfast  # or your namespace
  labels:
    app: your-service-name
    airp.monitored: "true"  # ← REQUIRED: Enables AIRP monitoring
    version: "1.0.0"
  annotations:
    # OPTIONAL: Explicitly declare dependencies
    # AIRP will auto-discover if not specified
    airp.io/depends-on: "database-service,cache-service,api-gateway"
    
    # OPTIONAL: Custom remediation hints
    airp.io/preferred-action: "scale_up"  # scale_up | rolling_restart | increase_memory
    airp.io/max-replicas: "10"
    airp.io/min-replicas: "2"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: your-service-name
  template:
    metadata:
      labels:
        app: your-service-name
        service: your-service-name  # ← REQUIRED: Must match Prometheus service label
        version: "1.0.0"
    spec:
      containers:
      - name: your-service-name
        image: your-registry/your-service:latest
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics  # ← REQUIRED: Metrics port
          containerPort: 9090
          protocol: TCP
        
        env:
        - name: SERVICE_NAME
          value: "your-service-name"
        - name: ENVIRONMENT
          value: "production"
        
        # Resource limits help AIRP make better decisions
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: your-service-name
  namespace: shopfast
  labels:
    app: your-service-name
    airp.monitored: "true"  # ← REQUIRED
spec:
  type: ClusterIP
  selector:
    app: your-service-name
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics  # ← REQUIRED: Expose metrics port
    port: 9090
    targetPort: metrics
    protocol: TCP

---
# ServiceMonitor for Prometheus scraping
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: your-service-name
  namespace: shopfast
  labels:
    app: your-service-name
spec:
  selector:
    matchLabels:
      app: your-service-name
  endpoints:
  - port: metrics
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s

---
# OPTIONAL: HorizontalPodAutoscaler
# AIRP respects HPA settings when scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: your-service-name
  namespace: shopfast
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: your-service-name
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

