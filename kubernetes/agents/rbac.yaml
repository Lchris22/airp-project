apiVersion: v1
kind: ServiceAccount
metadata:
  name: airp-agent-sa
  namespace: shopfast
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airp-agent-role
  namespace: shopfast
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: ["apps"]
  resources: ["deployments/scale"]
  verbs: ["get", "patch", "update"]
- apiGroups: ["apps"]
  resources: ["deployments/status"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airp-agent-binding
  namespace: shopfast
subjects:
- kind: ServiceAccount
  name: airp-agent-sa
  namespace: shopfast
roleRef:
  kind: Role
  name: airp-agent-role
  apiGroup: rbac.authorization.k8s.io

