apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: shopfast
type: Opaque
stringData:
  POSTGRES_PASSWORD: airp123
  POSTGRES_USER: airp
  POSTGRES_DB: airp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: shopfast
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:14
        ports:
        - containerPort: 5432
          name: postgres
        envFrom:
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: shopfast
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: shopfast
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

